document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ursor:pointer\"><\u002Fcircle>\n      <\u002Fsc-for>\n      <circle cx=\"{{ nowX }}\" cy=\"{{ nowY }}\" r=\"8\" fill=\"none\" stroke=\"#E3B341\" stroke-width=\"1.5\"><\u002Fcircle>\n      <text x=\"{{ nowX }}\" y=\"{{ nowLabelY }}\" text-anchor=\"middle\" fill=\"#E3B341\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\" letter-spacing=\"1.5\">NOW<\u002Ftext>\n      <text x=\"15\" y=\"136\" fill=\"#5B8C5A\" font-family=\"Oswald,sans-serif\" font-size=\"10\" letter-spacing=\"1.5\">BASE CAMP<\u002Ftext>\n      <text x=\"195\" y=\"136\" text-anchor=\"middle\" fill=\"#4E7A96\" font-family=\"Oswald,sans-serif\" font-size=\"10\" letter-spacing=\"1.5\">LOAD CAMP<\u002Ftext>\n      <text x=\"375\" y=\"136\" text-anchor=\"end\" fill=\"#C1652E\" font-family=\"Oswald,sans-serif\" font-size=\"10\" letter-spacing=\"1.5\">ALPINE PUSH<\u002Ftext>\n    <\u002Fsvg>\n\n    <!-- Stat row -->\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#232F3B;border:1px solid #232F3B;margin-top:12px\">\n      <div style=\"background:#1A2430;padding:10px 8px;text-align:center\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:1.5px;color:#7A8794\">START<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;margin-top:3px\">{{ startW }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1A2430;padding:10px 8px;text-align:center\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:1.5px;color:#E3B341\">CURRENT<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:#E3B341;margin-top:3px\">{{ currentW }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1A2430;padding:10px 8px;text-align:center\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:1.5px;color:#7A8794\">GOAL<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;margin-top:3px\">{{ goalW }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1A2430;padding:10px 8px;text-align:center\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:1.5px;color:#7A8794\">LOST<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;color:#5B8C5A;margin-top:3px\">{{ lostW }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ TODAY TAB ============ -->\n  <sc-if value=\"{{ showToday }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Today\" style=\"padding:16px\">\n      <div style=\"background:#1A2430;border:1px solid #232F3B;border-top:3px solid {{ todayPhaseColor }}\">\n        <div style=\"padding:16px 16px 0 16px;display:flex;justify-content:space-between;align-items:flex-start\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7A8794;letter-spacing:1px\">{{ todayDateLine }}<\u002Fdiv>\n            <div style=\"font-family:Oswald,sans-serif;font-size:26px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:6px;line-height:1.1\">{{ todayTitle }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;align-items:flex-end\">\n            <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:{{ todayPhaseColor }};border:1px solid {{ todayPhaseColor }};padding:3px 8px;white-space:nowrap\">{{ todayPhaseName }}<\u002Fdiv>\n            <sc-if value=\"{{ todayDeload }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#E3B341;border:1px solid #E3B341;padding:3px 8px\">DELOAD<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ todayDeload }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin:12px 16px 0 16px;font-family:Inter,sans-serif;font-size:12px;color:#E3B341;background:rgba(227,179,65,0.08);padding:8px 10px\">Deload week — cut all sets to 2, keep loads light, prioritize recovery.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"padding:14px 16px 16px 16px;display:flex;flex-direction:column\">\n          <sc-for list=\"{{ todayExercises }}\" as=\"ex\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid #232F3B\">\n              <div style=\"font-size:14px;font-weight:500\">{{ ex.name }}<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#A8B4BF;white-space:nowrap\">{{ ex.detail }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 16px 22px 16px\">\n          <button onclick=\"{{ toggleTodayDone }}\" style=\"width:64px;height:64px;border-radius:50%;border:2px solid {{ todayDoneBorder }};background:{{ todayDoneBg }};color:{{ todayDoneCheck }};font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1\">✓<\u002Fbutton>\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:2px;color:{{ todayDoneLabelColor }}\">{{ todayDoneLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Next milestone teaser -->\n      <div onclick=\"{{ openSummit }}\" style=\"background:#1A2430;border:1px solid #232F3B;border-left:3px solid #E3B341;display:flex;align-items:center;gap:14px;padding:14px;margin-top:14px;cursor:pointer\">\n        <svg viewBox=\"0 0 72 72\" style=\"width:52px;height:52px;flex:none\">\n          <circle cx=\"36\" cy=\"36\" r=\"34\" fill=\"#10161C\" stroke=\"{{ nextMs.ring }}\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"36\" cy=\"36\" r=\"28\" fill=\"none\" stroke=\"{{ nextMs.ring }}\" stroke-width=\"1\" opacity=\"0.45\"><\u002Fcircle>\n          <g transform=\"translate(12,12)\">\n            <sc-for list=\"{{ nextMs.iconPaths }}\" as=\"d\" hint-placeholder-count=\"0\">\n              <path d=\"{{ d }}\" fill=\"none\" stroke=\"{{ nextMs.icon }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <\u002Fsc-for>\n          <\u002Fg>\n        <\u002Fsvg>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:2px;color:#E3B341\">NEXT MILESTONE<\u002Fdiv>\n          <div style=\"font-family:Oswald,sans-serif;font-size:15px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;line-height:1.15\">{{ nextMs.title }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:8px\">\n            <div style=\"flex:1;height:5px;background:#10161C;border:1px solid #232F3B\">\n              <div style=\"height:100%;width:{{ nextMs.pct }};background:#C1652E\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#A8B4BF;white-space:nowrap\">{{ nextMs.progText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ WEEK TAB ============ -->\n  <sc-if value=\"{{ showWeek }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Week\" style=\"padding:16px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px\">\n        <button onclick=\"{{ prevWeek }}\" style=\"width:38px;height:38px;background:#1A2430;border:1px solid #232F3B;color:#A8B4BF;font-size:16px;cursor:pointer\">‹<\u002Fbutton>\n        <div style=\"text-align:center\">\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:8px\">\n            <div style=\"font-family:Oswald,sans-serif;font-size:16px;font-weight:600;letter-spacing:1.5px;color:{{ selPhaseColor }}\">WEEK {{ selWeekPad }}/26<\u002Fdiv>\n            <sc-if value=\"{{ selDeload }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-family:Oswald,sans-serif;font-size:9px;letter-spacing:1.5px;color:#E3B341;border:1px solid #E3B341;padding:2px 6px\">DELOAD<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#7A8794;letter-spacing:1px;margin-top:2px\">{{ selPhaseName }} · {{ selRange }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ nextWeek }}\" style=\"width:38px;height:38px;background:#1A2430;border:1px solid #232F3B;color:#A8B4BF;font-size:16px;cursor:pointer\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <sc-for list=\"{{ weekDays }}\" as=\"d\" hint-placeholder-count=\"7\">\n          <div style=\"background:#1A2430;border:1px solid #232F3B;border-left:3px solid {{ d.color }}\">\n            <div onclick=\"{{ d.onToggle }}\" style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;min-height:48px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7A8794;width:58px;line-height:1.4\">{{ d.abbr }}<br>{{ d.dateStr }}<\u002Fdiv>\n              <div style=\"flex:1;font-family:Oswald,sans-serif;font-size:15px;font-weight:500;text-transform:uppercase;letter-spacing:1px\">{{ d.title }}<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:{{ d.doneColor }}\">{{ d.doneMark }}<\u002Fdiv>\n              <div style=\"color:#4A5866;font-size:12px\">{{ d.chev }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ d.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:2px 14px 12px 84px;display:flex;flex-direction:column\">\n                <sc-for list=\"{{ d.exercises }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid #232F3B\">\n                    <div style=\"font-size:13px\">{{ ex.name }}<\u002Fdiv>\n                    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#A8B4BF;white-space:nowrap\">{{ ex.detail }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Weight check-in add-on -->\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px;margin-top:14px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px\">WEIGHT CHECK-IN<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#E3B341\">{{ currentW }} LB<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:12px\">\n          <input type=\"number\" inputmode=\"decimal\" step=\"0.1\" placeholder=\"Weight (lb)\" value=\"{{ wtInput }}\" onchange=\"{{ onWtChange }}\" style=\"flex:1;background:#10161C;border:1px solid #232F3B;color:#E8E4DC;font-family:'JetBrains Mono',monospace;font-size:15px;padding:11px 12px;min-height:44px\">\n          <button onclick=\"{{ logWeight }}\" style=\"background:#C1652E;border:none;color:#10161C;font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:0 20px;cursor:pointer;min-height:44px\">LOG<\u002Fbutton>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 366 190\" style=\"width:100%;display:block;margin-top:12px\">\n          <line x1=\"34\" y1=\"{{ wc.goalY }}\" x2=\"360\" y2=\"{{ wc.goalY }}\" stroke=\"#E3B341\" stroke-width=\"1\" stroke-dasharray=\"5 4\"><\u002Fline>\n          <text x=\"360\" y=\"{{ wc.goalLabelY }}\" text-anchor=\"end\" fill=\"#E3B341\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\" letter-spacing=\"1\">GOAL {{ goalW }}<\u002Ftext>\n          <sc-for list=\"{{ wc.gridLines }}\" as=\"g\" hint-placeholder-count=\"0\">\n            <line x1=\"34\" y1=\"{{ g.y }}\" x2=\"360\" y2=\"{{ g.y }}\" stroke=\"#232F3B\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"30\" y=\"{{ g.labelY }}\" text-anchor=\"end\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\">{{ g.label }}<\u002Ftext>\n          <\u002Fsc-for>\n          <path d=\"{{ wc.areaPath }}\" fill=\"#C1652E\" opacity=\"0.10\"><\u002Fpath>\n          <path d=\"{{ wc.linePath }}\" fill=\"none\" stroke=\"#C1652E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath>\n          <sc-for list=\"{{ wc.points }}\" as=\"p\" hint-placeholder-count=\"0\">\n            <circle cx=\"{{ p.x }}\" cy=\"{{ p.y }}\" r=\"3\" fill=\"#E3B341\" stroke=\"#10161C\" stroke-width=\"1.5\"><\u002Fcircle>\n          <\u002Fsc-for>\n          <text x=\"34\" y=\"186\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\">JUL 05<\u002Ftext>\n          <text x=\"360\" y=\"186\" text-anchor=\"end\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\">JAN 02<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"display:flex;flex-direction:column;margin-top:4px\">\n          <sc-for list=\"{{ wtRows }}\" as=\"w\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid #232F3B\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#7A8794\">{{ w.date }}<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:baseline\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px\">{{ w.lb }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ w.deltaColor }};width:52px;text-align:right\">{{ w.delta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ FUEL TAB ============ -->\n  <sc-if value=\"{{ showFuel }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Fuel\" style=\"padding:16px;display:flex;flex-direction:column;gap:14px\">\n\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px\">\n        <div style=\"text-align:center;flex:1\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#7A8794\">MAINTENANCE<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:22px;margin-top:4px;color:#A8B4BF\">3,100<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"color:#C1652E;font-size:18px\">→<\u002Fdiv>\n        <div style=\"text-align:center;flex:1\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#C1652E\">DAILY TARGET<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-top:4px;color:#C1652E\">{{ calTargetFmt }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;flex:1\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#7A8794\">DEFICIT<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:22px;margin-top:4px;color:#5B8C5A\">{{ deficitFmt }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px\">\n        <div style=\"background:#1A2430;border:1px solid #232F3B;border-top:3px solid #C1652E;padding:12px;text-align:center\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">230g<\u002Fdiv>\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#C1652E;margin-top:3px\">PROTEIN<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7A8794;margin-top:3px\">920 kcal<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1A2430;border:1px solid #232F3B;border-top:3px solid #4E7A96;padding:12px;text-align:center\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">200g<\u002Fdiv>\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#4E7A96;margin-top:3px\">CARBS<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7A8794;margin-top:3px\">800 kcal<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1A2430;border:1px solid #232F3B;border-top:3px solid #E3B341;padding:12px;text-align:center\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">70g<\u002Fdiv>\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#E3B341;margin-top:3px\">FAT<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7A8794;margin-top:3px\">630 kcal<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;color:#E8E4DC\">CALORIE LOG<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:12px\">\n          <input type=\"number\" inputmode=\"numeric\" placeholder=\"Today's calories\" value=\"{{ calInput }}\" onchange=\"{{ onCalChange }}\" style=\"flex:1;background:#10161C;border:1px solid #232F3B;color:#E8E4DC;font-family:'JetBrains Mono',monospace;font-size:15px;padding:11px 12px;min-height:44px\">\n          <button onclick=\"{{ logCalories }}\" style=\"background:#C1652E;border:none;color:#10161C;font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:0 20px;cursor:pointer;min-height:44px\">LOG<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:12px;border-top:1px solid #232F3B\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#7A8794\">7-DAY AVERAGE<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:{{ avgColor }}\">{{ calAvg }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;margin-top:6px\">\n          <sc-for list=\"{{ calRows }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid #232F3B\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#7A8794\">{{ c.date }}<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:baseline\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px\">{{ c.kcal }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ c.deltaColor }};width:52px;text-align:right\">{{ c.delta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px\">FOOD GUIDE<\u002Fdiv>\n        <div style=\"margin-top:10px;display:flex;flex-direction:column;gap:12px\">\n          <div>\n            <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#C1652E\">PROTEIN ANCHORS — EVERY MEAL<\u002Fdiv>\n            <div style=\"font-size:13px;color:#A8B4BF;margin-top:4px;line-height:1.6\">Chicken breast, lean beef, eggs + whites, Greek yogurt, cottage cheese, white fish, whey isolate.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#4E7A96\">CARBS — AROUND TRAINING<\u002Fdiv>\n            <div style=\"font-size:13px;color:#A8B4BF;margin-top:4px;line-height:1.6\">Rice, oats, potatoes, sweet potatoes, fruit, sourdough. Biggest portions before/after workouts and on ruck days.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#E3B341\">FATS — MEASURED<\u002Fdiv>\n            <div style=\"font-size:13px;color:#A8B4BF;margin-top:4px;line-height:1.6\">Olive oil, avocado, nuts (weighed), fatty fish 2x/week. Easy to overshoot — track them.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#7A8794\">MINIMIZE<\u002Fdiv>\n            <div style=\"font-size:13px;color:#A8B4BF;margin-top:4px;line-height:1.6\">Liquid calories, alcohol, fried food, restaurant meals more than 2x/week.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px\">\n        <div style=\"font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px\">SAMPLE DAY · 2,350<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;margin-top:6px\">\n          <sc-for list=\"{{ sampleMeals }}\" as=\"m\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;justify-content:space-between;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid #232F3B\">\n              <div>\n                <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#7A8794\">{{ m.slot }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#E8E4DC;margin-top:2px;line-height:1.5\">{{ m.food }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#A8B4BF;white-space:nowrap\">{{ m.kcal }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TRAILS TAB ============ -->\n  <sc-if value=\"{{ showTrails }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Trails\" style=\"padding:16px;display:flex;flex-direction:column;gap:14px\">\n\n      <!-- Detail view -->\n      <sc-if value=\"{{ trailDetailOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <button onclick=\"{{ closeTrail }}\" style=\"align-self:flex-start;background:none;border:1px solid #33465A;color:#A8B4BF;font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;padding:8px 14px;cursor:pointer;min-height:38px\">‹ ALL TRAILS<\u002Fbutton>\n\n          <div style=\"background:#1A2430;border:1px solid #232F3B\">\n            <svg viewBox=\"0 0 358 210\" style=\"width:100%;display:block;background:#10161C\">\n              <sc-for list=\"{{ td.contours }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <path d=\"{{ c.d }}\" fill=\"none\" stroke=\"#33465A\" stroke-width=\"1\"><\u002Fpath>\n              <\u002Fsc-for>\n              <path d=\"{{ td.routeD }}\" fill=\"none\" stroke=\"#C1652E\" stroke-width=\"2\" stroke-dasharray=\"6 3\" stroke-linejoin=\"round\"><\u002Fpath>\n              <circle cx=\"{{ td.sx }}\" cy=\"{{ td.sy }}\" r=\"4\" fill=\"#E3B341\" stroke=\"#10161C\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"{{ td.ex }}\" cy=\"{{ td.ey }}\" r=\"4\" fill=\"#C1652E\" stroke=\"#10161C\" stroke-width=\"1.5\"><\u002Fcircle>\n              <text x=\"{{ td.slx }}\" y=\"{{ td.sly }}\" fill=\"#E3B341\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8\" letter-spacing=\"1\">TRAILHEAD<\u002Ftext>\n              <text x=\"{{ td.elx }}\" y=\"{{ td.ely }}\" fill=\"#C1652E\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8\" letter-spacing=\"1\">SUMMIT<\u002Ftext>\n            <\u002Fsvg>\n            <div style=\"padding:16px\">\n              <div style=\"display:flex;justify-content:space-between;gap:10px;align-items:flex-start\">\n                <div style=\"font-family:Oswald,sans-serif;font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:1px;line-height:1.15\">{{ td.name }}<\u002Fdiv>\n                <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:{{ td.diffColor }};border:1px solid {{ td.diffColor }};padding:3px 8px;white-space:nowrap\">{{ td.diff }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#232F3B;border:1px solid #232F3B;margin-top:14px\">\n                <div style=\"background:#10161C;padding:9px 4px;text-align:center\">\n                  <div style=\"font-family:Oswald,sans-serif;font-size:8.5px;letter-spacing:1px;color:#7A8794\">DISTANCE<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:3px\">{{ td.dist }} MI<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#10161C;padding:9px 4px;text-align:center\">\n                  <div style=\"font-family:Oswald,sans-serif;font-size:8.5px;letter-spacing:1px;color:#7A8794\">GAIN<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:3px\">{{ td.gain }} FT<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#10161C;padding:9px 4px;text-align:center\">\n                  <div style=\"font-family:Oswald,sans-serif;font-size:8.5px;letter-spacing:1px;color:#7A8794\">EST TIME<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:3px\">{{ td.time }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#10161C;padding:9px 4px;text-align:center\">\n                  <div style=\"font-family:Oswald,sans-serif;font-size:8.5px;letter-spacing:1px;color:#7A8794\">DRIVE<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:3px\">{{ td.drive }} MIN<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#7A8794;margin-top:16px\">ELEVATION PROFILE<\u002Fdiv>\n              <svg viewBox=\"0 0 358 130\" style=\"width:100%;display:block;margin-top:6px\">\n                <line x1=\"38\" y1=\"18\" x2=\"348\" y2=\"18\" stroke=\"#232F3B\" stroke-width=\"1\" stroke-dasharray=\"2 4\"><\u002Fline>\n                <line x1=\"38\" y1=\"114\" x2=\"348\" y2=\"114\" stroke=\"#232F3B\" stroke-width=\"1\"><\u002Fline>\n                <text x=\"34\" y=\"21\" text-anchor=\"end\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8.5\">{{ td.gainLabel }}<\u002Ftext>\n                <text x=\"34\" y=\"117\" text-anchor=\"end\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8.5\">0<\u002Ftext>\n                <path d=\"{{ td.profileArea }}\" fill=\"#C1652E\" opacity=\"0.12\"><\u002Fpath>\n                <path d=\"{{ td.profileLine }}\" fill=\"none\" stroke=\"#C1652E\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath>\n                <text x=\"38\" y=\"128\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8.5\">0 MI<\u002Ftext>\n                <text x=\"348\" y=\"128\" text-anchor=\"end\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8.5\">{{ td.dist }} MI<\u002Ftext>\n              <\u002Fsvg>\n\n              <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;color:#7A8794;margin-top:14px\">TRAILHEAD<\u002Fdiv>\n              <div style=\"font-size:13px;color:#E8E4DC;margin-top:4px;line-height:1.55\">{{ td.trailhead }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#A8B4BF;margin-top:10px;line-height:1.6\">{{ td.notes }}<\u002Fdiv>\n\n              <button onclick=\"{{ logHike }}\" style=\"width:100%;margin-top:18px;background:{{ logBg }};border:1px solid {{ logBorder }};color:{{ logColor }};font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;padding:14px 0;cursor:pointer;min-height:48px\">{{ logLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- List view -->\n      <sc-if value=\"{{ trailListOpen }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n\n          <div style=\"background:#1A2430;border:1px solid #232F3B;border-top:3px solid #E3B341;padding:16px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n              <div style=\"font-family:Oswald,sans-serif;font-size:13px;font-weight:600;letter-spacing:2px\">THIS SATURDAY<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7A8794\">{{ satDateLine }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:16px;color:#E3B341;margin-top:8px\">{{ satPrescription }}<\u002Fdiv>\n            <div style=\"font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1.5px;color:#7A8794;margin-top:14px\">SUGGESTED MATCH<\u002Fdiv>\n            <div onclick=\"{{ suggested.onOpen }}\" style=\"display:flex;gap:12px;align-items:center;background:#10161C;border:1px solid #33465A;padding:10px;margin-top:6px;cursor:pointer\">\n              <svg viewBox=\"0 0 92 68\" style=\"width:80px;height:59px;flex:none\">\n                <sc-for list=\"{{ suggested.contours }}\" as=\"c\" hint-placeholder-count=\"0\">\n                  <path d=\"{{ c.d }}\" fill=\"none\" stroke=\"#33465A\" stroke-width=\"1\"><\u002Fpath>\n                <\u002Fsc-for>\n                <path d=\"{{ suggested.trailPath }}\" fill=\"none\" stroke=\"#C1652E\" stroke-width=\"1.5\" stroke-dasharray=\"4 2\"><\u002Fpath>\n              <\u002Fsvg>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-family:Oswald,sans-serif;font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;line-height:1.2\">{{ suggested.name }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#7A8794;margin-top:5px\">{{ suggested.statLine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"color:#4A5866;font-size:14px\">›<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ chipRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:6px;align-items:center\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:9px;color:#4A5866;letter-spacing:1px;width:42px;flex:none\">{{ row.label }}<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                  <sc-for list=\"{{ row.chips }}\" as=\"ch\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ ch.onClick }}\" style=\"background:{{ ch.bg }};border:1px solid {{ ch.border }};color:{{ ch.color }};font-family:Oswald,sans-serif;font-size:10px;letter-spacing:1px;padding:6px 10px;cursor:pointer\">{{ ch.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv> E FILTERS<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SUMMIT LOG ============ -->\n  <sc-if value=\"{{ showSummit }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Summit Log\" style=\"padding:16px;display:flex;flex-direction:column;gap:14px\">\n      <button onclick=\"{{ closeSummit }}\" style=\"align-self:flex-start;background:none;border:1px solid #33465A;color:#A8B4BF;font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1.5px;padding:8px 14px;cursor:pointer;min-height:38px\">‹ BACK<\u002Fbutton>\n\n      <!-- Ascent diagram -->\n      <div style=\"background:#1A2430;border:1px solid #232F3B;padding:16px 8px 8px 8px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:0 8px\">\n          <div style=\"font-family:Oswald,sans-serif;font-size:15px;font-weight:600;letter-spacing:2px\">THE ASCENT<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#E3B341\">{{ badgeCountLine }} BADGES<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#7A8794;letter-spacing:0.5px;padding:4px 8px 0 8px\">CURRENT POSITION · {{ currentCampName }}<\u002Fdiv>\n        <svg viewBox=\"0 0 358 340\" style=\"width:100%;display:block;margin-top:6px\">\n          <path d=\"{{ ascent.silhouette }}\" fill=\"#141C25\" stroke=\"#232F3B\" stroke-width=\"1\"><\u002Fpath>\n          <path d=\"{{ ascent.ridge }}\" fill=\"none\" stroke=\"#33465A\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"><\u002Fpath>\n          <sc-for list=\"{{ ascent.nodes }}\" as=\"n\" hint-placeholder-count=\"6\">\n            <line x1=\"{{ n.lx1 }}\" y1=\"{{ n.y }}\" x2=\"{{ n.lx2 }}\" y2=\"{{ n.y }}\" stroke=\"#232F3B\" stroke-width=\"1\"><\u002Fline>\n            <circle cx=\"{{ n.x }}\" cy=\"{{ n.y }}\" r=\"{{ n.r }}\" fill=\"{{ n.fill }}\" stroke=\"{{ n.stroke }}\" stroke-width=\"2\"><\u002Fcircle>\n            <text x=\"{{ n.tx }}\" y=\"{{ n.ty }}\" text-anchor=\"{{ n.anchor }}\" fill=\"{{ n.labelColor }}\" font-family=\"Oswald,sans-serif\" font-size=\"11\" letter-spacing=\"1\">{{ n.name }}<\u002Ftext>\n            <text x=\"{{ n.tx }}\" y=\"{{ n.ty2 }}\" text-anchor=\"{{ n.anchor }}\" fill=\"#4A5866\" font-family=\"'JetBrains Mono',monospace\" font-size=\"8.5\">{{ n.altCount }}<\u002Ftext>\n          <\u002Fsc-for>\n          <sc-for list=\"{{ ascent.hereMarker }}\" as=\"m\" hint-placeholder-count=\"0\">\n            <circle cx=\"{{ m.x }}\" cy=\"{{ m.y }}\" r=\"11\" fill=\"none\" stroke=\"#E3B341\" stroke-width=\"1.5\" style=\"animation:hereGlow 2s ease-in-out infinite\"><\u002Fcircle>\n            <circle cx=\"{{ m.x }}\" cy=\"{{ m.y }}\" r=\"4.5\" fill=\"#E3B341\"><\u002Fcircle>\n          <\u002Fsc-for>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <!-- Camps with badge grids -->\n      <sc-for list=\"{{ camps }}\" as=\"c\" hint-placeholder-count=\"6\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:10px;padding:6px 2px 12px 2px\">\n            <div style=\"width:12px;height:12px;border-radius:50%;background:{{ c.dotFill }};border:2px solid {{ c.dotStroke }};flex:none\"><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-family:Oswald,sans-serif;font-size:14px;font-weight:600;letter-spacing:1.5px;color:{{ c.nameColor }}\">{{ c.name }}<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#7A8794;letter-spacing:0.5px\">{{ c.alt }} FT<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:{{ c.countColor }}\">{{ c.count }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px\">\n            <sc-for list=\"{{ c.badges }}\" as=\"b\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px\">\n                <svg viewBox=\"0 0 72 72\" style=\"width:100%;max-width:76px;height:auto\">\n                  <circle cx=\"36\" cy=\"36\" r=\"34\" fill=\"{{ b.medalBg }}\" stroke=\"{{ b.ring }}\" stroke-width=\"2\"><\u002Fcircle>\n                  <circle cx=\"36\" cy=\"36\" r=\"28\" fill=\"none\" stroke=\"{{ b.ring }}\" stroke-width=\"1\" opacity=\"0.4\"><\u002Fcircle>\n                  <g transform=\"translate(12,12)\">\n                    <sc-for list=\"{{ b.iconPaths }}\" as=\"d\" hint-placeholder-count=\"0\">\n                      <path d=\"{{ d }}\" fill=\"none\" stroke=\"{{ b.icon }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n                    <\u002Fsc-for>\n                  <\u002Fg>\n                  <sc-for list=\"{{ b.starMark }}\" as=\"st\" hint-placeholder-count=\"0\">\n                    <circle cx=\"36\" cy=\"65\" r=\"3\" fill=\"#C1652E\" stroke=\"#10161C\" stroke-width=\"1\"><\u002Fcircle>\n                  <\u002Fsc-for>\n                <\u002Fsvg>\n                <div style=\"font-family:Oswald,sans-serif;font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:{{ b.titleColor }};line-height:1.15;min-height:24px;display:flex;align-items:center\">{{ b.title }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:8.5px;color:{{ b.subColor }};letter-spacing:0.5px\">{{ b.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TAB BAR ============ -->\n  <div style=\"position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0C1116;border-top:1px solid #232F3B;display:grid;grid-template-columns:repeat(4,1fr);z-index:10\">\n    <button onclick=\"{{ goToday }}\" style=\"background:none;border:none;padding:14px 0 18px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px\">\n      <div style=\"width:16px;height:3px;background:{{ tabBar.today }}\"><\u002Fdiv>\n      <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:2px;color:{{ tabColor.today }}\">TODAY<\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goWeek }}\" style=\"background:none;border:none;padding:14px 0 18px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px\">\n      <div style=\"width:16px;height:3px;background:{{ tabBar.week }}\"><\u002Fdiv>\n      <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:2px;color:{{ tabColor.week }}\">WEEK<\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goFuel }}\" style=\"background:none;border:none;padding:14px 0 18px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px\">\n      <div style=\"width:16px;height:3px;background:{{ tabBar.fuel }}\"><\u002Fdiv>\n      <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:2px;color:{{ tabColor.fuel }}\">FUEL<\u002Fdiv>\n    <\u002Fbutton>\n    <button onclick=\"{{ goTrails }}\" style=\"background:none;border:none;padding:14px 0 18px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px\">\n      <div style=\"width:16px;height:3px;background:{{ tabBar.trails }}\"><\u002Fdiv>\n      <div style=\"font-family:Oswald,sans-serif;font-size:11px;letter-spacing:2px;color:{{ tabColor.trails }}\">TRAILS<\u002Fdiv>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;startWeight&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:260,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:150,&quot;max&quot;:400,&quot;unit&quot;:&quot;lb&quot;,&quot;section&quot;:&quot;Plan&quot;},&quot;goalWeight&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:230,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:120,&quot;max&quot;:350,&quot;unit&quot;:&quot;lb&quot;,&quot;section&quot;:&quot;Plan&quot;},&quot;calorieTarget&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2350,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1500,&quot;max&quot;:4000,&quot;unit&quot;:&quot;kcal&quot;,&quot;section&quot;:&quot;Plan&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const saved = this.load();\n    this.state = {\n      tab: 'today',\n      weekSel: null,\n      expandedDay: null,\n      calInput: '',\n      wtInput: '',\n      trailSel: null,\n      trailFilters: { dist: 'any', gain: 'any', drive: 'any' },\n      summitBack: 'today',\n      badges: saved.badges || {},\n      celebrate: null,\n      completions: saved.completions || {},\n      calories: saved.calories || {},\n      weights: saved.weights || [{ date: '2026-07-05', lb: this.startWeight() }],\n      hikes: saved.hikes || {}\n    };\n  }\n\n  load() {\n    try { return JSON.parse(localStorage.getItem('expcon-v1')) || {}; } catch (e) { return {}; }\n  }\n  persist() {\n    const { completions, calories, weights, hikes, badges } = this.state;\n    try { localStorage.setItem('expcon-v1', JSON.stringify({ completions, calories, weights, hikes, badges })); } catch (e) {}\n  }\n  setP(patch) { this.setState(patch, () => this.persist()); }\n\n  componentDidMount() { this.reconcileBadges(false); }\n  componentDidUpdate() { this.reconcileBadges(true); }\n\n  reconcileBadges(celebrate) {\n    const earned = this.computeBadges().filter(b => b.earned);\n    const cur = this.state.badges;\n    const next = { ...cur };\n    let changed = false, newest = null;\n    earned.forEach(b => {\n      if (!cur[b.id]) { next[b.id] = b.when || this.keyOf(this.today()); changed = true; newest = b; }\n    });\n    if (changed) {\n      const patch = { badges: next };\n      if (celebrate && newest) patch.celebrate = newest.id;\n      this.setState(patch, () => {\n        this.persist();\n        if (celebrate && newest) {\n          clearTimeout(this._celebT);\n          this._celebT = setTimeout(() => this.setState({ celebrate: null }), 5200);\n        }\n      });\n    }\n  }\n\n  startWeight() { return this.props.startWeight ?? 260; }\n  goalWeight() { return this.props.goalWeight ?? 230; }\n  calTarget() { return this.props.calorieTarget ?? 2350; }\n\n  // ---- program calendar ----\n  startDate() { return new Date(2026, 6, 5); } // Sun Jul 5 2026\n  today() { const t = new Date(); t.setHours(0, 0, 0, 0); return t; }\n  dateOf(week, dow) {\n    const d = new Date(this.startDate());\n    d.setDate(d.getDate() + (week - 1) * 7 + dow);\n    return d;\n  }\n  keyOf(d) {\n    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');\n  }\n  fmtShort(d) {\n    const mo = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];\n    return mo + ' ' + String(d.getDate()).padStart(2, '0');\n  }\n  currentWeek() {\n    const days = Math.floor((this.today() - this.startDate()) / 86400000);\n    return Math.max(1, Math.min(26, Math.floor(days / 7) + 1));\n  }\n  isDeload(w) { return [5, 9, 14, 18, 23].includes(w); }\n  phaseOf(w) {\n    if (w <= 9) return { name: 'BASE CAMP', color: '#5B8C5A', idx: 0 };\n    if (w <= 18) return { name: 'LOAD CAMP', color: '#4E7A96', idx: 1 };\n    return { name: 'ALPINE PUSH', color: '#C1652E', idx: 2 };\n  }\n\n  workoutFor(week, dow) {\n    const p = this.phaseOf(week).idx;\n    const z2 = [60, 75, 90][p], thr = [40, 50, 60][p];\n    const pack = [45, 55, 65][p], hrs = ['2\\u20133 h', '3\\u20135 h', '5\\u20137 h'][p], gain = ['1,500', '2,500', '3,500'][p];\n    switch (dow) {\n      case 0: return { title: 'Lower A', type: 'strength', exercises: [\n        { name: 'Back Squat', detail: '4\\u00d75' },\n        { name: 'Romanian Deadlift', detail: '3\\u00d78' },\n        { name: 'Weighted Step-Up', detail: '3\\u00d710/leg' },\n        { name: 'Standing Calf Raise', detail: '3\\u00d715' },\n        { name: 'Hanging Knee Raise', detail: '3\\u00d712' }] };\n      case 1: return { title: 'Upper Pull B', type: 'strength', exercises: [\n        { name: 'Weighted Pull-Up', detail: '4\\u00d75' },\n        { name: 'Barbell Row', detail: '4\\u00d78' },\n        { name: 'Single-Arm DB Row', detail: '3\\u00d710' },\n        { name: 'Face Pull', detail: '3\\u00d715' },\n        { name: 'Farmer Carry', detail: '4\\u00d740 m' }] };\n      case 2: return { title: 'Zone 2 Cardio', type: 'cardio', exercises: [\n        { name: 'Incline Treadmill', detail: z2 + ' min \\u00b7 10\\u201312%' },\n        { name: 'Heart Rate Cap', detail: '130\\u2013145 bpm' },\n        { name: 'Hip + Ankle Mobility', detail: '15 min' }] };\n      case 3: return { title: 'Lower / Full C', type: 'strength', exercises: [\n        { name: 'Deadlift', detail: '4\\u00d75' },\n        { name: 'Front Squat', detail: '3\\u00d76' },\n        { name: 'Walking Lunge', detail: '3\\u00d712/leg' },\n        { name: 'Box Step-Down', detail: '3\\u00d710/leg' },\n        { name: 'Weighted Plank', detail: '3\\u00d760 s' }] };\n      case 4: return { title: 'Threshold Cardio', type: 'cardio', exercises: [\n        { name: 'Stairmill', detail: thr + ' min \\u00b7 145\\u2013155 bpm' },\n        { name: 'Cooldown Walk', detail: '10 min' },\n        { name: 'Calf + Quad Stretch', detail: '10 min' }] };\n      case 5: return { title: 'Upper Push + Core D', type: 'strength', exercises: [\n        { name: 'Overhead Press', detail: '4\\u00d75' },\n        { name: 'Incline DB Bench', detail: '3\\u00d78' },\n        { name: 'Weighted Dip', detail: '3\\u00d710' },\n        { name: 'Pallof Press', detail: '3\\u00d712/side' },\n        { name: 'Weighted Sit-Up', detail: '3\\u00d715' }] };\n      default: return { title: 'Long Hike / Ruck', type: 'ruck', exercises: [\n        { name: 'Ruck Pack', detail: pack + ' lb' },\n        { name: 'Duration', detail: hrs },\n        { name: 'Elevation Gain', detail: gain + ' ft' },\n        { name: 'Fuel on the Move', detail: '200\\u2013300 kcal/h' }] };\n    }\n  }\n\n  // ---- ridgeline geometry ----\n  ridge() {\n    const pts = [];\n    for (let i = 0; i < 26; i++) {\n      const week = i + 1;\n      const x = 15 + i * (360 / 25);\n      const jag = ((i * 37) % 11) - 5;\n      let y = 112 - (i / 25) * 86 + jag;\n      if (this.isDeload(week)) y += 9;\n      pts.push({ x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10, week });\n    }\n    return pts;\n  }\n  segPaths(pts, from, to) {\n    // include one point past `to` for continuity\n    const seg = pts.slice(from, Math.min(to + 1, pts.length));\n    const line = 'M' + seg.map(p => p.x + ' ' + p.y).join(' L');\n    const fill = line + ' L' + seg[seg.length - 1].x + ' 124 L' + seg[0].x + ' 124 Z';\n    return { line, fill };\n  }\n\n  // ---- trails ----\n  trails() {\n    return [\n      { id: 'talcott', name: 'Talcott Mountain \\u00b7 Heublein Tower', dist: 2.5, gain: 550, time: '1:30', drive: 45, diff: 'Easy', seed: 2,\n        trailhead: 'Route 185 lot, Simsbury. Restrooms at the tower (seasonal).',\n        notes: 'Steady climb on wide gravel to the ridgeline, then flat walking to the tower. Ideal early-phase ruck footing.' },\n      { id: 'giant', name: 'Sleeping Giant \\u00b7 Tower Trail', dist: 3.2, gain: 740, time: '1:45', drive: 15, diff: 'Moderate', seed: 5,\n        trailhead: 'Main lot on Mt Carmel Ave, Hamden \\u2014 opposite Quinnipiac.',\n        notes: 'Carriage road with a consistent grade to the stone tower. Add the Blue Trail loop for extra vert.' },\n      { id: 'chauncey', name: 'Mattabesett \\u00b7 Chauncey Peak Loop', dist: 4.8, gain: 900, time: '2:30', drive: 25, diff: 'Moderate', seed: 8,\n        trailhead: 'Giuffrida Park, Meriden. Lot fills by 9 AM on weekends.',\n        notes: 'Cliff-edge walking above Crescent Lake, two summits per lap. Rocky sections \\u2014 good boot practice.' },\n      { id: 'ragged', name: 'Ragged Mountain Loop', dist: 5.5, gain: 1100, time: '3:00', drive: 30, diff: 'Moderate', seed: 11,\n        trailhead: 'West Lane lot, Berlin. No facilities.',\n        notes: 'Traprock ridgeline with repeated short climbs \\u2014 the best mid-phase leg burner in central CT.' },\n      { id: 'bear', name: 'Bear Mountain via Undermountain', dist: 6.7, gain: 1650, time: '4:00', drive: 75, diff: 'Hard', seed: 14,\n        trailhead: 'Undermountain Trail lot, Route 41, Salisbury.',\n        notes: 'Highest peak in CT. Sustained climb with a steep, scrambly summit block \\u2014 treat it as a dress rehearsal.' }\n    ];\n  }\n  diffColor(diff) { return diff === 'Easy' ? '#5B8C5A' : diff === 'Hard' ? '#C1652E' : '#E3B341'; }\n  topo(seed, w, h, rings) {\n    const paths = [];\n    const cx = w * 0.48, cy = h * 0.5;\n    for (let k = 1; k <= rings; k++) {\n      const r = (k / rings) * Math.min(w, h) * 0.55 + 3;\n      let d = '';\n      const steps = 26;\n      for (let i = 0; i <= steps; i++) {\n        const a = (i % steps) / steps * Math.PI * 2;\n        const wob = 1 + 0.16 * Math.sin(a * 3 + seed) + 0.11 * Math.sin(a * 5 + seed * 2.3) + 0.07 * Math.sin(a * 8 + seed * 4.1);\n        const x = cx + Math.cos(a) * r * wob * (w / h) * 0.62;\n        const y = cy + Math.sin(a) * r * wob * 0.78;\n        d += (i ? ' L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1);\n      }\n      paths.push({ d: d + ' Z' });\n    }\n    return paths;\n  }\n  trailRoute(seed, w, h) {\n    let d = '', ex = 0, ey = 0, sx = 0, sy = 0;\n    const n = 12;\n    for (let i = 0; i <= n; i++) {\n      const t = i / n;\n      const x = (0.12 + t * 0.38) * w + Math.sin(t * 9 + seed) * w * 0.05;\n      const y = (0.80 - t * 0.32) * h + Math.sin(t * 13 + seed * 2) * h * 0.05;\n      if (i === 0) { sx = x; sy = y; }\n      if (i === n) { ex = x; ey = y; }\n      d += (i ? ' L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1);\n    }\n    return { d, sx, sy, ex, ey };\n  }\n  trailProfile(seed, w, h) {\n    const pts = [];\n    const n = 32;\n    for (let i = 0; i <= n; i++) {\n      const t = i / n;\n      const up = t < 0.55 ? t / 0.55 : (1 - t) / 0.45;\n      const e = Math.max(0, Math.min(1, Math.pow(up, 1.15) + 0.05 * Math.sin(t * 21 + seed)));\n      pts.push((38 + t * (w - 48)).toFixed(1) + ' ' + (h - 16 - e * (h - 34)).toFixed(1));\n    }\n    const line = 'M' + pts.join(' L');\n    const area = line + ' L' + (w - 10) + ' ' + (h - 16) + ' L38 ' + (h - 16) + ' Z';\n    return { line, area };\n  }\n  nextSaturday() {\n    const t = this.today();\n    const d = new Date(t);\n    d.setDate(d.getDate() + ((6 - t.getDay()) + 7) % 7);\n    return d;\n  }\n  targetGain(week) {\n    let g = 500 + (week - 1) * (3500 - 500) / 25;\n    if (this.isDeload(week)) g *= 0.6;\n    return g;\n  }\n\n  // ---- achievements ----\n  ICONS() {\n    return {\n      mountain: ['M4 40 L18 14 L26 26 L32 18 L44 40 Z', 'M18 14 L22 20', 'M32 18 L29 23'],\n      pack: ['M16 18 Q16 9 24 9 Q32 9 32 18', 'M13 18 L35 18 L35 42 L13 42 Z', 'M19 27 L29 27', 'M21 18 L21 12', 'M27 18 L27 12'],\n      dumbbell: ['M8 24 L40 24', 'M8 18 L8 30', 'M13 20 L13 28', 'M35 20 L35 28', 'M40 18 L40 30'],\n      fire: ['M24 8 Q33 20 27 30 Q32 28 31 22 Q39 32 30 42 Q17 46 15 33 Q14 24 22 22 Q18 15 24 8 Z'],\n      calendar: ['M12 14 L36 14 L36 40 L12 40 Z', 'M12 22 L36 22', 'M18 10 L18 18', 'M30 10 L30 18'],\n      check: ['M10 26 L20 36 L38 12'],\n      scale: ['M24 10 L24 40', 'M14 40 L34 40', 'M16 20 L32 20', 'M16 20 L11 30 L21 30 Z', 'M32 20 L27 30 L37 30 Z'],\n      trophy: ['M16 12 L32 12 L31 24 Q24 30 17 24 Z', 'M16 14 L10 14 Q10 22 17 22', 'M32 14 L38 14 Q38 22 31 22', 'M24 30 L24 36', 'M18 40 L30 40 L30 36 L18 36 Z'],\n      clock: ['M24 24 m-15 0 a15 15 0 1 0 30 0 a15 15 0 1 0 -30 0', 'M24 24 L24 13', 'M24 24 L32 29'],\n      shield: ['M24 8 L38 14 L38 26 Q38 38 24 44 Q10 38 10 26 L10 14 Z', 'M18 25 L23 31 L32 18'],\n      utensils: ['M15 9 L15 41', 'M11 9 L11 19 Q11 23 15 23', 'M19 9 L19 19 Q19 23 15 23', 'M32 9 Q26 12 26 23 L32 23 L32 41'],\n      flag: ['M16 42 L16 9', 'M16 11 L33 15 L16 21']\n    };\n  }\n  BADGE_DEFS() {\n    return [\n      { id: 'first_ruck', camp: 0, icon: 'pack', title: 'First Ruck', goal: 1, kind: 'ruck' },\n      { id: 'lb_5', camp: 0, icon: 'scale', title: '5 lb Down', goal: 5, kind: 'lb' },\n      { id: 'streak_7', camp: 0, icon: 'calendar', title: '7-Day Streak', goal: 7, kind: 'streak' },\n      { id: 'rucks_10', camp: 1, icon: 'pack', title: '10 Rucks', goal: 10, kind: 'ruck' },\n      { id: 'ruck_3h', camp: 1, icon: 'clock', title: 'First 3-Hr Ruck', goal: 1, kind: 'ruck3h' },\n      { id: 'lb_10', camp: 1, icon: 'scale', title: '10 lb Down', goal: 10, kind: 'lb' },\n      { id: 'streak_30', camp: 2, icon: 'fire', title: '30-Day Streak', goal: 30, kind: 'streak' },\n      { id: 'workouts_50', camp: 2, icon: 'dumbbell', title: '50 Sessions', goal: 50, kind: 'sessions' },\n      { id: 'perfect_week', camp: 2, icon: 'check', title: 'Perfect Week', goal: 1, kind: 'perfect' },\n      { id: 'lb_20', camp: 3, icon: 'scale', title: '20 lb Down', goal: 20, kind: 'lb' },\n      { id: 'base_survived', camp: 3, icon: 'mountain', title: 'Base Camp Survived', goal: 63, kind: 'phase', phase: 0 },\n      { id: 'cal_30', camp: 3, icon: 'utensils', title: '30-Day Fuel Log', goal: 30, kind: 'calstreak' },\n      { id: 'workouts_100', camp: 4, icon: 'dumbbell', title: '100 Sessions', goal: 100, kind: 'sessions' },\n      { id: 'load_complete', camp: 4, icon: 'mountain', title: 'Load Camp Complete', goal: 63, kind: 'phase', phase: 1 },\n      { id: 'deloads_all', camp: 4, icon: 'shield', title: 'All Deloads Respected', goal: 5, kind: 'deload' },\n      { id: 'alpine_finished', camp: 5, icon: 'flag', title: 'Alpine Push Finished', goal: 56, kind: 'phase', phase: 2 },\n      { id: 'goal_230', camp: 5, icon: 'trophy', title: 'Summit Weight', goal: 1, kind: 'goal' }\n    ];\n  }\n  CAMP_DEFS() {\n    return [\n      { name: 'TRAILHEAD', alt: '0' },\n      { name: 'CAMP 1', alt: '17,600' },\n      { name: 'CAMP 2', alt: '19,900' },\n      { name: 'CAMP 3', alt: '21,300' },\n      { name: 'HIGH CAMP', alt: '26,000' },\n      { name: 'SUMMIT', alt: '29,032' }\n    ];\n  }\n  weekOfKey(key) {\n    const d = new Date(key + 'T00:00:00');\n    return Math.floor((d - this.startDate()) / 604800000) + 1;\n  }\n  longestRun(keys) {\n    if (!keys.length) return 0;\n    const days = [...new Set(keys.map(k => Math.floor(new Date(k + 'T00:00:00').getTime() / 86400000)))].sort((a, b) => a - b);\n    let best = 1, run = 1;\n    for (let i = 1; i < days.length; i++) {\n      run = days[i] === days[i - 1] + 1 ? run + 1 : 1;\n      if (run > best) best = run;\n    }\n    return best;\n  }\n  metrics() {\n    const s = this.state;\n    const doneKeys = Object.keys(s.completions).filter(k => s.completions[k]);\n    const sessions = doneKeys.length;\n    const ruckKeys = doneKeys.filter(k => new Date(k + 'T00:00:00').getDay() === 6);\n    const streak = this.longestRun(doneKeys);\n    // perfect week\n    const byWeek = {};\n    doneKeys.forEach(k => { const w = this.weekOfKey(k); byWeek[w] = (byWeek[w] || 0) + 1; });\n    const perfect = Object.values(byWeek).some(c => c >= 7);\n    // phases\n    const phaseTot = [63, 63, 56];\n    const phaseDone = [0, 0, 0];\n    doneKeys.forEach(k => { const w = this.weekOfKey(k); if (w >= 1 && w <= 9) phaseDone[0]++; else if (w >= 10 && w <= 18) phaseDone[1]++; else if (w >= 19 && w <= 26) phaseDone[2]++; });\n    // weight\n    const sorted = [...s.weights].sort((a, b) => a.date < b.date ? -1 : 1);\n    let maxLost = 0, lb5 = null, lb10 = null, lb20 = null, goalWhen = null, running = this.startWeight();\n    const goal = this.goalWeight();\n    sorted.forEach(e => {\n      const lost = this.startWeight() - puteBadges();\n    const fmtWhen = id => {\n      const k = s.badges[id];\n      if (!k) return '';\n      const d = new Date(k + 'T00:00:00');\n      return this.fmtShort(d) + ' ' + d.getFullYear();\n    };\n    const earnedRing = '#C1652E', earnedIcon = '#E3B341', lockGray = '#3A4653';\n    const camps = campDefs.map((cd, ci) => {\n      const list = allBadges.filter(b => b.camp === ci);\n      const earnedN = list.filter(b => b.earned).length;\n      const full = earnedN === list.length;\n      const badges = list.map(b => {\n        let sub;\n        if (b.earned) sub = fmtWhen(b.id) || 'EARNED';\n        else if (b.goal > 1) sub = b.cur + '/' + b.goal;\n        else sub = 'LOCKED';\n        return {\n          title: b.title, iconPaths: b.iconPaths,\n          ring: b.earned ? earnedRing : lockGray,\n          icon: b.earned ? earnedIcon : lockGray,\n          medalBg: b.earned ? '#141C25' : 'transparent',\n          titleColor: b.earned ? '#E8E4DC' : '#5A6672',\n          subColor: b.earned ? '#E3B341' : '#4A5866',\n          sub, starMark: b.earned ? [1] : []\n        };\n      });\n      return {\n        name: cd.name, alt: cd.alt,\n        badges,\n        count: earnedN + '/' + list.length,\n        countColor: full ? '#5B8C5A' : earnedN > 0 ? '#E3B341' : '#4A5866',\n        dotFill: full ? '#E3B341' : earnedN > 0 ? '#C1652E' : '#10161C',\n        dotStroke: earnedN > 0 ? '#E3B341' : '#3A4653',\n        nameColor: earnedN > 0 ? '#E8E4DC' : '#7A8794',\n        earnedN, total: list.length\n      };\n    });\n    const totalEarned = allBadges.filter(b => b.earned).length;\n    // ascent diagram nodes (summit top → trailhead bottom)\n    const nodeX = [70, 150, 110, 200, 165, 250];\n    const ascNodes = campDefs.map((cd, ci) => {\n      const y = 300 - ci * 52;\n      const x = nodeX[ci];\n      const c = camps[ci];\n      const reached = c.earnedN > 0;\n      const full = c.earnedN === c.total;\n      const leftLabel = x > 180;\n      return {\n        x, y, r: reached ? 6 : 4,\n        fill: full ? '#E3B341' : reached ? '#C1652E' : '#10161C',\n        stroke: reached ? '#E3B341' : '#3A4653',\n        lx1: leftLabel ? x - 46 : x + 12, lx2: leftLabel ? x - 12 : x + 46,\n        tx: leftLabel ? x - 50 : x + 50, anchor: leftLabel ? 'end' : 'start',\n        ty: y - 1, ty2: y + 10,\n        name: cd.name, altCount: cd.alt + ' FT \\u00b7 ' + c.count,\n        labelColor: reached ? '#E8E4DC' : '#5A6672'\n      };\n    });\n    const ridge = 'M' + ascNodes.map(n => n.x + ' ' + n.y).join(' L');\n    const silhouette = 'M0 300 L70 300 L' + ascNodes.slice().reverse().map(n => n.x + ' ' + n.y).join(' L') + ' L250 300 L358 300 L358 340 L0 340 Z';\n    const highestReached = camps.reduce((acc, c, i) => c.earnedN > 0 ? i : acc, 0);\n    const anyReached = camps.some(c => c.earnedN > 0);\n    const hereNode = ascNodes[highestReached];\n    const hereMarker = anyReached ? [{ x: hereNode.x, y: hereNode.y }] : [];\n    const currentCampName = anyReached ? campDefs[highestReached].name : 'TRAILHEAD';\n\n    // next milestone teaser\n    const locked = allBadges.filter(b => !b.earned);\n    const nextBadge = locked.slice().sort((a, b) => (b.cur / b.goal) - (a.cur / a.goal))[0] || allBadges[0];\n    const nextRatio = Math.min(1, nextBadge.cur / nextBadge.goal);\n    const nextCampName = campDefs[nextBadge.camp].name;\n    const nextMs = {\n      title: nextBadge.title, iconPaths: nextBadge.iconPaths,\n      ring: nextRatio > 0 ? '#C1652E' : '#3A4653',\n      icon: nextRatio > 0 ? '#E3B341' : '#3A4653',\n      pct: Math.round(nextRatio * 100) + '%',\n      progText: nextBadge.goal > 1 ? (nextBadge.cur + ' / ' + nextBadge.goal) : nextCampName\n    };\n\n    // celebration\n    const celebBadge = s.celebrate ? allBadges.find(b => b.id === s.celebrate) : null;\n\n    const tab = s.tab;\n    const on = '#E8E4DC', off = '#4A5866';\n    const barOn = '#C1652E', barOff = 'transparent';\n\n    return {\n      headerMeta: 'WK ' + String(nowWeek).padStart(2, '0') + '/26 \\u00b7 ' + phase.name,\n      badgeCountLine: totalEarned + '/' + allBadges.length,\n      openSummit: () => this.setState({ summitBack: s.tab === 'summit' ? 'today' : s.tab, tab: 'summit' }),\n      closeSummit: () => this.setState({ tab: s.summitBack || 'today' }),\n      showSummit: tab === 'summit',\n      camps,\n      currentCampName,\n      ascent: { silhouette, ridge, nodes: ascNodes, hereMarker },\n      nextMs,\n      showCelebrate: !!celebBadge,\n      celeb: celebBadge ? { title: celebBadge.title, iconPaths: celebBadge.iconPaths, campName: campDefs[celebBadge.camp].name } : { title: '', iconPaths: [], campName: '' },\n      dismissCelebrate: () => this.setState({ celebrate: null }),\n      ridgeLine1: s1.line, ridgeFill1: s1.fill,\n      ridgeLine2: s2.line, ridgeFill2: s2.fill,\n      ridgeLine3: s3.line, ridgeFill3: s3.fill,\n      ridgePoints,\n      nowX: nowPt.x, nowY: nowPt.y, nowLabelY: nowPt.y - 14,\n      startW: startW.toFixed(0), currentW: cur.toFixed(1), goalW: goal.toFixed(0), lostW: (lost > 0 ? '-' : '') + Math.abs(lost).toFixed(1),\n\n      showToday: tab === 'today', showWeek: tab === 'week', showFuel: tab === 'fuel', showTrails: tab === 'trails',\n      goToday: () => this.setState({ tab: 'today' }),\n      goWeek: () => this.setState({ tab: 'week' }),\n      goFuel: () => this.setState({ tab: 'fuel' }),\n      goTrails: () => this.setState({ tab: 'trails' }),\n      tabColor: { today: tab === 'today' ? on : off, week: tab === 'week' ? on : off, fuel: tab === 'fuel' ? on : off, trails: tab === 'trails' ? on : off },\n      tabBar: { today: tab === 'today' ? barOn : barOff, week: tab === 'week' ? barOn : barOff, fuel: tab === 'fuel' ? barOn : barOff, trails: tab === 'trails' ? barOn : barOff },\n\n      todayDateLine: dayNames[dow] + ' \\u00b7 ' + this.fmtShort(today) + ' \\u00b7 WK ' + String(nowWeek).padStart(2, '0') + '/26',\n      todayTitle: tw.title,\n      todayPhaseColor: phase.color,\n      todayPhaseName: phase.name,\n      todayDeload: this.isDeload(nowWeek),\n      todayExercises: tw.exercises,\n      toggleTodayDone: () => this.setP({ completions: { ...s.completions, [todayKey]: !done } }),\n      todayDoneBorder: done ? '#5B8C5A' : '#4A5866',\n      todayDoneBg: done ? '#5B8C5A' : 'transparent',\n      todayDoneCheck: done ? '#10161C' : '#4A5866',\n      todayDoneLabel: done ? 'COMPLETE' : 'MARK COMPLETE',\n      todayDoneLabelColor: done ? '#5B8C5A' : '#7A8794',\n\n      selWeekPad: String(selWeek).padStart(2, '0'),\n      selPhaseColor: selPhase.color,\n      selPhaseName: selPhase.name,\n      selDeload: this.isDeload(selWeek),\n      selRange: this.fmtShort(selStart) + '\\u2013' + this.fmtShort(selEnd),\n      prevWeek: () => this.setState({ weekSel: Math.max(1, selWeek - 1), expandedDay: null }),\n      nextWeek: () => this.setState({ weekSel: Math.min(26, selWeek + 1), expandedDay: null }),\n      weekDays,\n\n      calTargetFmt: calTarget.toLocaleString('en-US'),\n      deficitFmt: '-' + (3100 - calTarget).toLocaleString('en-US'),\n      calInput: s.calInput,\n      onCalChange: e => this.setState({ calInput: e.target.value }),\n      logCalories: () => {\n        const v = parseInt(s.calInput, 10);\n        if (!v || v < 200 || v > 12000) return;\n        this.setP({ calories: { ...s.calories, [todayKey]: v }, calInput: '' });\n      },\n      calAvg: avg != null ? avg.toLocaleString('en-US') + ' kcal' : '\\u2014',\n      avgColor: avg == null ? '#4A5866' : avg <= calTarget ? '#5B8C5A' : '#C1652E',\n      calRows,\n      sampleMeals: [\n        { slot: 'BREAKFAST', food: '4 eggs + 4 whites, oats w/ berries, black coffee', kcal: '620' },\n        { slot: 'LUNCH', food: '8 oz chicken, 1.5 cup rice, mixed greens + olive oil', kcal: '650' },\n        { slot: 'PRE-TRAINING', food: 'Banana + whey isolate shake', kcal: '280' },\n        { slot: 'DINNER', food: '8 oz lean beef, baked potato, roasted vegetables', kcal: '600' },\n        { slot: 'EVENING', food: 'Greek yogurt + almonds', kcal: '200' }\n      ],\n\n      wtInput: s.wtInput,\n      onWtChange: e => this.setState({ wtInput: e.target.value }),\n      logWeight: () => {\n        const v = parseFloat(s.wtInput);\n        if (!v || v < 80 || v > 500) return;\n        const rest = s.weights.filter(w => w.date !== todayKey);\n        this.setP({ weights: [...rest, { date: todayKey, lb: Math.round(v * 10) / 10 }], wtInput: '' });\n      },\n      satDateLine: 'SAT \\u00b7 ' + this.fmtShort(satDate),\n      satPrescription: satPack + ' LB RUCK \\u00b7 ' + satHrs + ' \\u00b7 ' + satGainFt + ' FT GAIN',\n      suggested: mkCard(suggestedTrail),\n      chipRows,\n      trailCards,\n      noTrails: trailCards.length === 0,\n      trailDetailOpen: !!td,\n      trailListOpen: !td,\n      td,\n      closeTrail: () => this.setState({ trailSel: null }),\n      logHike: () => { if (selTrail) this.setP({ completions: { ...s.completions, [satKey]: true }, hikes: { ...s.hikes, [satKey]: selTrail.id } }); },\n      logLabel: satDone ? '\\u2713 LOGGED \\u2014 SATURDAY COMPLETE' : 'LOG THIS HIKE',\n      logBg: satDone ? '#5B8C5A' : '#C1652E',\n      logBorder: satDone ? '#5B8C5A' : '#C1652E',\n      logColor: '#10161C',\n\n      wc: this.weightChart(),\n      wtRows\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
